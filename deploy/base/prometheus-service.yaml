# Prometheus exposed as a NodePort (30090, published to the host by the kind
# config) so the harness can run PromQL queries from outside the cluster during
# and after the fault window — mirroring how loadgen reaches testapp on 30080.
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: kresil
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: http
      nodePort: 30090
