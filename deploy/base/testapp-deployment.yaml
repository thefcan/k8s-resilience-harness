apiVersion: apps/v1
kind: Deployment
metadata:
  name: testapp
  namespace: kresil
spec:
  replicas: 3
  selector:
    matchLabels:
      app: testapp
  template:
    metadata:
      labels:
        app: testapp
    spec:
      # Spread replicas across nodes so pod-kill (M2) and node-drain (M3) stay
      # meaningful — losing one node should not take out every replica.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: testapp
      containers:
        - name: testapp
          image: testapp:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: REDIS_ADDR
              value: "redis:6379"
            - name: PORT
              value: "8080"
            - name: LOG_LEVEL
              value: "info"
          livenessProbe:
            httpGet:
              path: /livez
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
