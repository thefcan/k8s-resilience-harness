# Stable, load-balanced endpoint for the SUT. Exposed as a NodePort (30080,
# published to the host by the kind config) so loadgen can drive the Service
# from outside the cluster while kube-proxy spreads traffic across all ready
# replicas and re-routes around killed pods (needed for M2).
apiVersion: v1
kind: Service
metadata:
  name: testapp
  namespace: kresil
spec:
  type: NodePort
  selector:
    app: testapp
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30080
