name: ci

on:
  push:
    branches: [main]
  pull_request:

# Pin tool versions in one place so local and CI stay in lockstep.
env:
  GO_VERSION: "1.26"
  GOLANGCI_LINT_VERSION: "v2.12.2"
  KIND_VERSION: "v0.30.0"

jobs:
  lint-unit:
    name: lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" "${GOLANGCI_LINT_VERSION}"

      - name: Lint
        run: "$(go env GOPATH)/bin/golangci-lint run"

      - name: Test (race)
        run: go test -race ./...

      - name: Build
        run: go build ./...

  cluster:
    name: kind cluster bring-up / tear-down
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kind
        run: |
          curl -sSLo ./kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind --version

      - name: Cluster up
        run: bash scripts/cluster-up.sh

      - name: Show cluster state
        run: |
          kubectl get nodes -o wide
          kubectl get pods -A

      - name: Cluster down
        if: always()
        run: bash scripts/cluster-down.sh
