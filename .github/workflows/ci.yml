name: ci

on:
  push:
    branches: [main]
  pull_request:

# Pin tool versions in one place so local and CI stay in lockstep.
env:
  GO_VERSION: "1.26"
  GOLANGCI_LINT_VERSION: "v2.12.2"
  KIND_VERSION: "v0.30.0"

jobs:
  lint-unit:
    name: lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" "${GOLANGCI_LINT_VERSION}"

      - name: Lint
        run: "$(go env GOPATH)/bin/golangci-lint run"

      - name: Test (race)
        run: go test -race ./...

      - name: Build
        run: go build ./...

  integration:
    name: integration (kind deploy + experiments)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install kind
        run: |
          curl -sSLo ./kind "https://kind.sigs.k8s.io/dl/${KIND_VERSION}/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind --version

      - name: Cluster up
        run: bash scripts/cluster-up.sh

      - name: Build + load testapp image
        run: bash scripts/build-images.sh

      - name: Deploy SUT (Redis + testapp)
        run: bash scripts/deploy.sh

      # M4: prove the in-cluster Prometheus discovered and is scraping all three
      # testapp replicas before the experiments rely on it for server-side metrics.
      - name: Verify Prometheus is scraping the SUT (M4)
        run: |
          for i in $(seq 1 12); do
            up=$(curl -sf 'http://localhost:30090/api/v1/query?query=count(up%7Bjob%3D%22testapp%22%7D%3D%3D1)' \
                 | jq -r '.data.result[0].value[1] // "0"')
            echo "attempt ${i}: testapp targets up = ${up}"
            if [ "${up}" = "3" ]; then
              echo "Prometheus is scraping all 3 testapp replicas"
              exit 0
            fi
            sleep 5
          done
          echo "::error::Prometheus did not report 3 healthy testapp targets"
          curl -s 'http://localhost:30090/api/v1/targets' | jq '.data.activeTargets[] | {job: .labels.job, health, scrapeUrl}' || true
          exit 1

      - name: Measure steady-state baseline
        env:
          RPS: "50"
          DURATION: "15s"
        run: bash scripts/baseline.sh

      - name: Gate on baseline success rate
        run: |
          cat results/baseline.json
          rate=$(jq -r '.summary.success_rate' results/baseline.json)
          echo "baseline success_rate = ${rate}"
          awk -v r="${rate}" 'BEGIN { exit (r >= 0.95 ? 0 : 1) }' \
            || { echo "::error::baseline success_rate ${rate} < 0.95"; exit 1; }

      - name: Run pod-kill resilience experiment
        run: go run ./cmd/harness run -experiment experiments/pod-kill.yaml -prometheus http://localhost:30090 -out results/pod-kill.json

      - name: Run node-drain resilience experiment
        run: go run ./cmd/harness run -experiment experiments/node-drain.yaml -prometheus http://localhost:30090 -out results/node-drain.json

      - name: Run resource-pressure resilience experiment
        run: go run ./cmd/harness run -experiment experiments/resource-pressure.yaml -prometheus http://localhost:30090 -out results/resource-pressure.json

      # Negative test, run last: cutting Redis is expected to violate steady state,
      # so the harness MUST exit non-zero. If it exits 0 the gate is broken. The
      # -prometheus flag also records the server-side view of the FAIL (redis_up
      # collapsing to 0) alongside the client-side verdict.
      - name: Verify the harness FAILS a real partition (negative test)
        run: |
          if go run ./cmd/harness run -experiment experiments/dependency-partition.yaml -prometheus http://localhost:30090 -out results/dependency-partition.json; then
            echo "::error::dependency-partition unexpectedly PASSED — the steady-state gate did not fire"
            exit 1
          fi
          echo "dependency-partition correctly FAILED (harness exited non-zero, as designed)"

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: experiment-reports
          path: |
            results/baseline.json
            results/pod-kill.json
            results/node-drain.json
            results/resource-pressure.json
            results/dependency-partition.json
          if-no-files-found: warn

      - name: Cluster down
        if: always()
        run: bash scripts/cluster-down.sh
